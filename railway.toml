[build]
builder = "nixpacks"

[build.setup]
providers = ["python", "node"]

[phases.setup]
nixPkgs = ["python311", "python311Packages.pip"]

[phases.install]
cmds = ["npm ci", "python3.11 -m pip install -r server/requirements.txt"]

[phases.build]
cmds = ["npm run build"]

[deploy]
startCommand = "cd server && python3.11 -m uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}"
healthcheckPath = "/"
restartPolicyType = "ON_FAILURE"
maxRestartCount = 10
